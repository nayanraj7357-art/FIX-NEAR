<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — FixNear</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="{{ url_for('home') }}" class="navbar__logo">Fix<span>Near</span></a>
    </div>
  </nav>

  <section class="auth-page">
    <div class="auth-card">
      <div class="auth-card__heading">
        <h1>Set New Password</h1>
        <p>Create a strong password for your account</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          {% if category == 'error' %}
            <div class="alert alert--error" style="padding:14px 20px;border-radius:10px;margin-bottom:20px;font-size:.88rem;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5">
              <i class="fas fa-exclamation-circle"></i> {{ message }}
            </div>
          {% endif %}
        {% endfor %}
      {% endwith %}

      <form action="{{ url_for('set_new_password') }}" method="POST" novalidate onsubmit="return validatePasswords()">
        <div class="form-group">
          <label for="new_password">New Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock" id="toggleNewPw" style="cursor:pointer" onclick="togglePw('new_password','toggleNewPw')"></i>
            <input type="password" id="new_password" name="new_password" placeholder="Min 6 characters" required>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm New Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock" id="toggleConfirmPw" style="cursor:pointer" onclick="togglePw('confirm_password','toggleConfirmPw')"></i>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Retype password" required>
          </div>
        </div>
        <div id="pwError" style="color:#d93025; font-size:0.8rem; margin-bottom:10px; display:none;">Passwords do not match or are too short.</div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">
          <i class="fas fa-save"></i> Save New Password
        </button>
      </form>
    </div>
  </section>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  <script>
    function togglePw(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-lock','fa-lock-open');
        icon.style.color = '#6c63ff';
      } else {
        input.type = 'password';
        icon.classList.replace('fa-lock-open','fa-lock');
        icon.style.color = '';
      }
    }
    
    function validatePasswords() {
        const p1 = document.getElementById('new_password').value;
        const p2 = document.getElementById('confirm_password').value;
        const err = document.getElementById('pwError');
        if (p1.length < 6) {
            err.textContent = "Password must be at least 6 characters.";
            err.style.display = "block";
            return false;
        }
        if (p1 !== p2) {
            err.textContent = "Passwords do not match.";
            err.style.display = "block";
            return false;
        }
        return true;
    }
  </script>
</body>
</html>
