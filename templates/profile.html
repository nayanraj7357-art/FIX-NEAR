<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - FixNear</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .profile-page { padding-top: 100px; min-height: 100vh; background: var(--off-white); padding-bottom: 60px; }
    .profile-page .container { max-width: 720px; }
    .profile-card {
      background: var(--white); border-radius: var(--radius-xl); padding: 40px 36px;
      box-shadow: var(--shadow-lg); border: 1px solid rgba(226,232,240,.5);
    }
    .profile-card h1 { font-size: 1.5rem; font-weight: 800; color: var(--dark); margin-bottom: 6px; }
    .profile-card > p { color: var(--text-muted); font-size: .88rem; margin-bottom: 28px; }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #06b6d4);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 20px;
    }
    .section-divider { border: none; border-top: 1.5px solid var(--light-gray); margin: 28px 0; }
    .section-title { font-size: .9rem; font-weight: 700; color: var(--dark); margin-bottom: 16px; }
    .alert { padding: 14px 20px; border-radius: var(--radius-md); margin-bottom: 20px; font-size: .88rem; font-weight: 500; }
    .alert--success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .alert--error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 768px) {
      .profile-card { padding: 28px 20px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="{{ url_for('home') }}" class="navbar__logo">Fix<span>Near</span></a>
      <div class="navbar__links" id="navLinks">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('user_dashboard') }}">Dashboard</a>
        <a href="{{ url_for('book_service') }}">Book Service</a>
        <a href="{{ url_for('profile') }}" class="active">Profile</a>
        <a href="{{ url_for('logout') }}" class="btn-login" style="color:#dc2626;border-color:#dc2626"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
      <button class="navbar__hamburger" id="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <section class="profile-page">
    <div class="container">
      <div class="profile-card">
        <div class="profile-avatar">{{ user_data.name[0]|upper }}</div>
        <h1><i class="fas fa-user-circle" style="color:var(--primary)"></i> My Profile</h1>
        <p>Update your personal information and change your password.</p>

        <div id="profileAlert"></div>

        <!-- Profile Info -->
        <div class="section-title"><i class="fas fa-id-card" style="margin-right:6px;color:var(--primary)"></i> Personal Information</div>
        <form id="profileForm">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Full Name</label>
              <div class="input-wrapper"><i class="fas fa-user"></i><input type="text" id="name" name="name" value="{{ user_data.name }}" required></div>
            </div>
            <div class="form-group">
              <label for="phone">Phone</label>
              <div class="input-wrapper"><i class="fas fa-phone"></i><input type="tel" id="phone" name="phone" value="{{ user_data.phone }}" required></div>
            </div>
          </div>
          <div class="form-group">
            <label for="email">Email (cannot be changed)</label>
            <div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="email" value="{{ user_data.email }}" disabled></div>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
            <i class="fas fa-save"></i> Update Profile
          </button>
        </form>

        <hr class="section-divider">

        <!-- Change Password -->
        <div class="section-title"><i class="fas fa-lock" style="margin-right:6px;color:var(--primary)"></i> Change Password</div>
        <form id="passwordForm">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="form-group">
            <label for="current_password">Current Password</label>
            <div class="input-wrapper"><i class="fas fa-key"></i><input type="password" id="current_password" name="current_password" placeholder="Enter current password" required></div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="new_password">New Password</label>
              <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="new_password" name="new_password" placeholder="Min 6 characters" required></div>
            </div>
            <div class="form-group">
              <label for="confirm_password">Confirm Password</label>
              <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required></div>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
            <i class="fas fa-key"></i> Change Password
          </button>
        </form>
      </div>
    </div>
  </section>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  <script>
    function showProfileAlert(msg, type) {
      const area = document.getElementById('profileAlert');
      area.innerHTML = `<div class="alert alert--${type}"><i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}</div>`;
      setTimeout(() => area.innerHTML = '', 4000);
    }

    document.getElementById('profileForm').addEventListener('submit', function(e) {
      e.preventDefault();
      fetch('{{ url_for("api_update_profile") }}', {
        method: 'POST',
        body: new URLSearchParams(new FormData(this))
      }).then(r => r.json()).then(data => {
        showProfileAlert(data.message, data.success ? 'success' : 'error');
      });
    });

    document.getElementById('passwordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const newPw = document.getElementById('new_password').value;
      const confirmPw = document.getElementById('confirm_password').value;
      if (newPw.length < 6) { showProfileAlert('Password must be at least 6 characters.', 'error'); return; }
      if (newPw !== confirmPw) { showProfileAlert('New passwords do not match.', 'error'); return; }
      fetch('{{ url_for("api_change_password") }}', {
        method: 'POST',
        body: new URLSearchParams(new FormData(this))
      }).then(r => r.json()).then(data => {
        showProfileAlert(data.message, data.success ? 'success' : 'error');
        if (data.success) this.reset();
      });
    });
  </script>
</body>
</html>
